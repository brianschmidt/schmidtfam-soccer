<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LMFC Weekend HQ — design review</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600;700&display=swap" />
<style>
  html, body { margin: 0; padding: 0; background: #e9e6df; font-family: 'Geist', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  /* hide DesignCanvas's own bg grid? keep default — it's warm and works */
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script src="tokens.js"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="browser-window.jsx"></script>
<script type="text/babel" src="mobile-app.jsx"></script>
<script type="text/babel" src="desktop-app.jsx"></script>

<script type="text/babel" data-presets="react">

function Canvas() {
  return (
    <DesignCanvas>
      <DCSection id="overview" title="Weekend HQ" subtitle="A redesign of the LMFC Memorial Day tournament plan — same information, far less friction. Tap any event card to expand it; the timeline shows Sofia + Max as parallel lanes so conflicts and gaps are visible at a glance.">

        <DCArtboard id="mobile-schedule" label="Mobile · Schedule (Sat)" width={420} height={880}>
          <div data-screen-label="01 Mobile · Saturday schedule" style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100%' }}>
            <IOSDevice width={402} height={874}>
              <MobileApp initialTab="schedule" initialDay="sat" />
            </IOSDevice>
          </div>
        </DCArtboard>

        <DCArtboard id="mobile-sunday" label="Mobile · Schedule (Sun)" width={420} height={880}>
          <div data-screen-label="02 Mobile · Sunday schedule" style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100%' }}>
            <IOSDevice width={402} height={874}>
              <MobileApp initialTab="schedule" initialDay="sun" />
            </IOSDevice>
          </div>
        </DCArtboard>

        <DCArtboard id="mobile-venues" label="Mobile · Venues" width={420} height={880}>
          <div data-screen-label="03 Mobile · Venues" style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100%' }}>
            <IOSDevice width={402} height={874}>
              <MobileApp initialTab="venues" />
            </IOSDevice>
          </div>
        </DCArtboard>

        <DCArtboard id="mobile-pack" label="Mobile · Pack" width={420} height={880}>
          <div data-screen-label="04 Mobile · Pack list" style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100%' }}>
            <IOSDevice width={402} height={874}>
              <MobileApp initialTab="pack" />
            </IOSDevice>
          </div>
        </DCArtboard>

      </DCSection>

      <DCSection id="desktop" title="Desktop · weekend at a glance" subtitle="On a laptop, both days sit side by side; the left rail holds the up-next card, the morning conflict play, and quick access to venues, packing, and notes.">

        <DCArtboard id="desktop-weekend" label="Desktop · Weekend overview" width={1320} height={1020}>
          <div data-screen-label="05 Desktop · Weekend overview" style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100%' }}>
            <ChromeWindow
              width={1280} height={980}
              url="lmfc-soccer.com"
              tabs={[{ title:'LMFC Memorial Day Weekend' }, { title:'Maps · United Sports' }, { title:'Maps · GCVSA' }]}
              activeIndex={0}
            >
              <div style={{ height: '100%', overflowY:'auto' }}>
                <DesktopApp />
              </div>
            </ChromeWindow>
          </div>
        </DCArtboard>

      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Canvas />);
</script>
</body>
</html>
