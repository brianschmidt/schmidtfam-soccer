<style>
  :root{
    --bg:#F7F4EE; --surface:#FFFFFF; --surface-2:#F1ECE3;
    --hairline:rgba(26,23,20,0.08); --hairline-strong:rgba(26,23,20,0.16);
    --ink:#1A1714; --ink-2:#3A332B; --muted:#857C72; --muted-soft:#A8A097;
    --sofia:#B23457; --sofia-bg:#FBE9EE; --sofia-tint:#FDF4F6; --sofia-ink:#7A1F38;
    --max:#1F6F6C; --max-bg:#DDECEB; --max-tint:#F0F7F6; --max-ink:#0E4644;
    --warn:#B6531B; --warn-bg:#FBEAD8; --warn-tint:#FDF5EC; --ok:#3D7A3A; --ok-bg:#E4EFDF;
    --font:"Geist",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --mono:"Geist Mono",ui-monospace,"SF Mono",Menlo,monospace;
    --shadow:0 1px 2px rgba(26,23,20,0.04),0 4px 14px rgba(26,23,20,0.06);
    --shadow-lg:0 8px 28px rgba(26,23,20,0.08),0 2px 6px rgba(26,23,20,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:var(--font); line-height:1.4;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  button{font-family:inherit;}
  a{color:inherit;}

  /* Layout switch — single breakpoint */
  .app-root.desktop{display:none;}
  #app-mobile{height:100dvh; display:flex; flex-direction:column; background:var(--bg);}
  @media(min-width:1100px){
    #app-mobile{display:none;}
    .app-root.desktop{display:block;}
  }

  /* Sticky lane header inside the mobile scroll area only */
  .tl-head{position:sticky; top:0; z-index:5; background:var(--bg);}
  @media(min-width:1100px){ .tl-head{position:static;} }

  .m-content{-webkit-overflow-scrolling:touch;}

  /* Print: clean, both days on separate pages */
  .print-only{display:none;}
  @media print{
    .app-root{display:none !important;}
    .print-only{display:block !important;}
    body{background:#fff; color:#000;}
    @page{margin:14mm;}
    .pr-day{page-break-inside:auto;}
    .pr-day + .pr-day{page-break-before:always;}
    .pr-ev{page-break-inside:avoid;}
  }
</style>
</head>
<body>
  <div id="app-mobile" class="app-root mobile"></div>

/* ───────────────────────── Tokens + helpers ───────────────────────── */
const T = {
  bg:'#F7F4EE', surface:'#FFFFFF', surface2:'#F1ECE3',
  hairline:'rgba(26,23,20,0.08)', hairlineStrong:'rgba(26,23,20,0.16)',
  ink:'#1A1714', ink2:'#3A332B', muted:'#857C72', mutedSoft:'#A8A097',
  sofia:'#B23457', sofiaBg:'#FBE9EE', sofiaTint:'#FDF4F6', sofiaInk:'#7A1F38',
  max:'#1F6F6C', maxBg:'#DDECEB', maxTint:'#F0F7F6', maxInk:'#0E4644',
  warn:'#B6531B', warnBg:'#FBEAD8', warnTint:'#FDF5EC', ok:'#3D7A3A', okBg:'#E4EFDF',
  font:"'Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif",
  fontMono:"'Geist Mono',ui-monospace,'SF Mono',Menlo,monospace",
  r:8, rLg:14, rXl:22,
  shadow:'0 1px 2px rgba(26,23,20,0.04),0 4px 14px rgba(26,23,20,0.06)',
  shadowLg:'0 8px 28px rgba(26,23,20,0.08),0 2px 6px rgba(26,23,20,0.05)',
};

const fmtTime = (mins)=>{const h=Math.floor(mins/60),m=mins%60,hr12=((h+11)%12)+1,ap=h<12?'AM':'PM';return `${hr12}:${m.toString().padStart(2,'0')} ${ap}`;};
const fmtTimeShort = (mins)=>{const h=Math.floor(mins/60),m=mins%60,hr12=((h+11)%12)+1;if(m===0)return `${hr12}${h<12?'a':'p'}`;return `${hr12}:${m.toString().padStart(2,'0')}${h<12?'a':'p'}`;};
const fmtDur = (mins)=>{if(mins<60)return `${mins}m`;const h=Math.floor(mins/60),m=mins%60;return m?`${h}h ${m}m`:`${h}h`;};
const fmtCountdown = (mins)=>{if(mins<0)return 'now';if(mins<60)return `in ${mins}m`;const h=Math.floor(mins/60),m=mins%60;return m?`in ${h}h ${m}m`:`in ${h}h`;};
const kidColor = (lane)=>{
  if(lane==='sofia')return {fg:T.sofia,bg:T.sofiaBg,tint:T.sofiaTint,deep:T.sofiaInk};
  if(lane==='max')  return {fg:T.max,bg:T.maxBg,tint:T.maxTint,deep:T.maxInk};
  if(lane==='hotel')return {fg:T.ink2,bg:T.surface2,tint:T.surface2,deep:T.ink};
  return {fg:T.ink,bg:T.surface2,tint:T.surface2,deep:T.ink};
};
const mapsHref = (addr)=>`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(addr)}`;
const esc = (s)=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// "Now" comes from the device clock. The tournament is Sat/Sun only, so any
// non-Sunday maps to Saturday (per the handoff spec).
function getNow(){
  const d = new Date();
  return { day: d.getDay() === 0 ? 'sun' : 'sat', minute: d.getHours()*60 + d.getMinutes() };
}

// Style-object → inline-style string (React-like px handling)
const UNITLESS = new Set(['opacity','zIndex','fontWeight','lineHeight','flex','flexGrow','flexShrink','order','zoom','WebkitLineClamp']);
function st(o){
  return Object.entries(o).filter(([,v])=>v!=null&&v!==false).map(([k,v])=>{
    let val = (typeof v==='number' && !UNITLESS.has(k) && v!==0) ? v+'px' : v;
    const key = k.replace(/[A-Z]/g, m=>'-'+m.toLowerCase());
    return `${key}:${val}`;
  }).join(';');
}

  warn:(c='currentColor')=>`<svg width="16" height="16" viewBox="0 0 24 24" fill="${c}" stroke="none"><path d="M12 2L1 22h22L12 2zm0 7v6m0 3v.5" stroke="white" stroke-width="1.8" fill="${c}"/></svg>`,

  chev:(c='currentColor',dir='down')=>{const r=dir==='down'?0:dir==='up'?180:dir==='right'?-90:90;return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="transform:rotate(${r}deg);transition:transform .2s"><path d="M6 9l6 6 6-6"/></svg>`;},
  dot:(c='currentColor')=>`<svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="${c}"/></svg>`,
  close:(c='currentColor')=>`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>`,
  check:(c='currentColor')=>`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></svg>`,
  indoor:(c='currentColor')=>`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7v9H3z"/><path d="M9 20v-5h6v5"/></svg>`,
};

const shortOpp = (op)=> (op||'')
  .replace(' Football Academy','').replace(' EDP Boys','')
  .replace(' White 2014','').replace(' Youth Phoenix','')
  .replace('Syracuse Development Academy ','SDA ');

/* ───────────────────────── Results ───────────────────────── */
// Aggregate each kid's record from games that have a recorded result.
// result is stored as { for, against } — goals scored / conceded by their team.
function teamRecords(){
  const blank=()=>({w:0,l:0,d:0,gf:0,ga:0,played:0,last:null});
  const rec={sofia:blank(),max:blank()};
  DATA.days.forEach(d=>d.events.forEach(e=>{
    if(e.kind!=='game'||!e.result||!rec[e.lane]) return;
    const r=rec[e.lane], gf=e.result.for, ga=e.result.against;
    r.played++; r.gf+=gf; r.ga+=ga;
    if(gf>ga)r.w++; else if(gf<ga)r.l++; else r.d++;
    r.last={for:gf,against:ga};
  }));
  return rec;
}
const outcomeOf = (res)=> res.for>res.against?'W':res.for<res.against?'L':'D';
const outcomeStyle = (o)=> o==='W'?{fg:T.ok,bg:T.okBg}:o==='L'?{fg:T.warn,bg:T.warnBg}:{fg:T.muted,bg:T.surface2};
function resultBadgeHTML(res, o){
  o=o||{}; const oc=outcomeOf(res), c=outcomeStyle(oc);
  const label = o.long?(oc==='W'?'Won':oc==='L'?'Lost':'Draw'):oc;
  return `<span style="${st({display:'inline-flex',alignItems:'center',gap:5,fontFamily:T.fontMono,fontSize:o.size||10.5,fontWeight:700,color:c.fg,background:c.bg,borderRadius:5,padding:'2px 7px',letterSpacing:0.4})}"><span>${label}</span><span>${res.for}–${res.against}</span></span>`;
}
// The two team-record pills shown in the top navigation.
function resultPillsHTML(o){
  o=o||{}; const rec=teamRecords();
  const names={sofia:'Sofia',max:'Max'};
  return ['sofia','max'].map(lane=>{
    const col=kidColor(lane), r=rec[lane];
    const recStr = `${r.w}–${r.l}${r.d?'–'+r.d:''}`;
    const last = r.last
      ? resultBadgeHTML(r.last,{size:o.small||9.5})
      : `<span style="${st({fontFamily:T.fontMono,fontSize:o.small||9.5,fontWeight:600,color:T.mutedSoft,letterSpacing:0.6})}">no games yet</span>`;
    return `<div style="${st({display:'inline-flex',alignItems:'center',gap:7,padding:'5px 11px',background:col.bg,borderRadius:999})}">
      <span style="${st({width:7,height:7,borderRadius:999,background:col.fg,flexShrink:0})}"></span>
      <span style="${st({fontFamily:T.fontMono,fontSize:o.name||10.5,fontWeight:700,color:col.deep,letterSpacing:0.8,textTransform:'uppercase'})}">${names[lane]}</span>
      <span style="${st({fontFamily:T.fontMono,fontSize:o.rec||12,fontWeight:700,color:col.deep,letterSpacing:0.4})}">${recStr}</span>
      ${last}
    </div>`;
  }).join('');
}

/* ───────────────────────── State ───────────────────────── */

  ? localStorage.getItem('lmfc.day') : getNow().day;

function evInnerHTML(ev, expanded){
  if(ev.kind==='travel') return chipBoxHTML(ev) + (expanded?chipDetailsHTML(ev):'');
  return gameBoxHTML(ev) + (expanded?gameDetailsHTML(ev):'');
}
function timelineHTML(day, pxPerMin){
  const startMin=day.startHour*60, endMin=day.endHour*60, total=endMin-startMin, height=total*pxPerMin;
  const yFor=(m)=>(m-startMin)*pxPerMin;
  const sNow=getNow();
  let hours=''; for(let h=day.startHour;h<=day.endHour;h++){
    hours += `<div style="${st({position:'absolute',left:0,right:0,top:yFor(h*60),display:'flex',alignItems:'center',pointerEvents:'none'})}">
      <div style="${st({width:38,fontFamily:T.fontMono,fontSize:10.5,color:T.mutedSoft,fontWeight:500,letterSpacing:0.6,transform:'translateY(-7px)'})}">${h===12?'12p':(h>12?`${h-12}p`:`${h}a`)}</div>
      <div style="${st({flex:1,height:1,borderTop:`1px ${h%2===0?'solid':'dashed'} ${T.hairline}`})}"></div>
    </div>`;
  }
  let conflicts = day.conflicts.map(c=>`<div style="${st({position:'absolute',top:yFor(c.start),height:(c.end-c.start)*pxPerMin,left:38,right:0,background:'repeating-linear-gradient(135deg, rgba(182,83,27,0.07) 0 6px, rgba(182,83,27,0.03) 6px 12px)',border:`1.5px dashed ${T.warn}`,borderRadius:10,display:'flex',alignItems:'flex-start',justifyContent:'flex-end',padding:'4px 8px',pointerEvents:'none',zIndex:0})}">
      <span style="${st({fontFamily:T.fontMono,fontSize:9.5,fontWeight:700,color:T.warn,letterSpacing:0.8,textTransform:'uppercase',background:T.warnTint,padding:'2px 5px',borderRadius:4})}">${esc(c.label)}</span>
    </div>`).join('');
  let events = day.events.map(ev=>{
    const isCard = ev.kind==='game'||ev.kind==='dinner';
    const y=yFor(ev.start), h=(ev.end-ev.start)*pxPerMin;
    let left, width, baseZ;
    if(ev.kind==='travel' && ev.lane==='both'){ left=38; width='calc(100% - 38px)'; baseZ=1; }
    else { const leftSide = ev.lane==='sofia'; left = leftSide?'38px':'calc(50% + 4px + 19px)'; width='calc(50% - 23px - 4px)'; baseZ=isCard?2:1; }
    const minH = isCard ? Math.max(72, Math.min(h-6,130)) : Math.max(28, h-4);
    const wrapStyle = st({position:'absolute',top:y,left,width,zIndex:baseZ});
    const evw = `${day.id}::${ev.id}`;
    return `<div class="evw" data-evw="${evw}" data-day="${day.id}" data-id="${ev.id}" data-z="${baseZ}" style="${wrapStyle}"><div style="min-height:${minH}px">${evInnerHTML(ev,false)}</div></div>`;
  }).join('');
  const showNow = sNow.day===day.id && sNow.minute>=startMin && sNow.minute<=endMin;
  const nowLine = showNow ? `<div style="${st({position:'absolute',left:0,right:0,top:yFor(sNow.minute),zIndex:6,pointerEvents:'none',display:'flex',alignItems:'center'})}">
      <div style="${st({width:38,paddingRight:4,textAlign:'right',fontFamily:T.fontMono,fontSize:9.5,fontWeight:700,color:T.warn,letterSpacing:0.6,textTransform:'uppercase',transform:'translateY(-7px)'})}">Now</div>
      <div style="${st({flex:1,height:0,borderTop:`1.5px solid ${T.warn}`,position:'relative'})}"><div style="${st({position:'absolute',left:-1,top:-4,width:7,height:7,borderRadius:999,background:T.warn})}"></div></div>
    </div>` : '';
  return `<div style="${st({padding:'12px 18px 20px'})}">
    <div class="tl-head" style="${st({display:'flex',paddingBottom:6,paddingTop:6})}">
      <div style="${st({width:38,flexShrink:0})}"></div>
      <div style="${st({flex:1,display:'flex',gap:8})}">${laneHeaderHTML('Sofia','sofia')}${laneHeaderHTML('Max','max')}</div>
    </div>
    <div style="${st({position:'relative',height,marginTop:4})}">${hours}${conflicts}${events}${nowLine}</div>
  </div>`;
}

          <span style="${st({padding:'3px 8px',background:col.fg,color:'#fff',borderRadius:999,fontSize:10.5,letterSpacing:0.8})}">${fmtCountdown(mins)}</span>
          ${next.attending===false?`<span style="${st({padding:'3px 8px',background:T.surface2,color:T.muted,borderRadius:999,fontSize:10.5,letterSpacing:0.8})}">Not attending</span>`:''}
        </div>
        <div style="${st({display:'flex',alignItems:'flex-start',gap:14})}">
          <div>
            <div style="${st({fontFamily:T.fontMono,fontSize:30,fontWeight:600,color:T.ink,letterSpacing:-1.2,lineHeight:0.95})}">${fmtTime(next.start).replace(/\s(AM|PM)/,'')}</div>
            <div style="${st({fontFamily:T.fontMono,fontSize:11,color:T.muted,marginTop:2,letterSpacing:0.6})}">${fmtTime(next.start).slice(-2)} · ${fmtDur(next.end-next.start)}</div>

            <div style="${st({fontSize:18,fontWeight:600,color:col.deep,letterSpacing:-0.3,lineHeight:1.15,marginBottom:4})}">${title}</div>

              ${esc(next.venue)} · <span style="${st({fontFamily:T.fontMono,fontWeight:600})}">${esc(next.field)}</span>

function printHTML(){
  const days = DATA.days.map(day=>{
    const rows = day.events.slice().sort((a,b)=>a.start-b.start).map(ev=>{
      if(ev.kind==='travel'){
        return `<div class="pr-ev" style="padding:6px 0;border-top:1px solid #ddd;display:flex;gap:12px;color:#444;">
          <div style="font-family:var(--mono);font-weight:700;width:78px;">${fmtTime(ev.start)}</div>
          <div><b>${esc(ev.title)}</b>${ev.drive?` · ${ev.drive}m drive`:''}<br><span style="color:#666;font-size:12px;">${esc(ev.detail||'')}</span></div>
        </div>`;
      }
      const isDinner=ev.kind==='dinner';
      const who = `${esc(ev.who)} · ${isDinner?esc(ev.label||'Team dinner'):esc(ev.game)}${ev.attending===false?'  (NOT ATTENDING)':''}`;
      const titleLine = isDinner?esc(ev.venue):'vs '+esc(ev.opponent);
      return `<div class="pr-ev" style="padding:8px 0;border-top:1px solid #ddd;display:flex;gap:12px;">
        <div style="font-family:var(--mono);font-weight:700;width:78px;">${fmtTime(ev.start)}</div>
        <div style="flex:1;">
          <div style="font-weight:700;">${who}</div>
          <div>${titleLine}${ev.result?` — <b>${outcomeOf(ev.result)==='W'?'Won':outcomeOf(ev.result)==='L'?'Lost':'Draw'} ${ev.result.for}–${ev.result.against}</b>`:''}</div>
          <div style="color:#555;font-size:12px;">${esc(ev.venue)} · ${esc(ev.field)} · ${esc(ev.addr)}</div>
          ${ev.note?`<div style="color:#555;font-size:12px;font-style:italic;">${esc(ev.note)}</div>`:''}
        </div>
      </div>`;
    }).join('');
    const conf = day.conflicts.map(c=>`<div style="margin:4px 0 10px;font-size:12px;color:#B6531B;font-weight:700;">⚠ ${esc(c.label)} — ${fmtTime(c.start)}–${fmtTime(c.end)}</div>`).join('');
    return `<section class="pr-day" style="margin-bottom:18px;">
      <h2 style="font-size:20px;margin:0 0 2px;">${esc(day.dow)}, ${esc(day.date)}, 2026</h2>
      ${conf}
      ${rows}
    </section>`;
  }).join('');
  const venues = DATA.venues.map(v=>`<div style="padding:6px 0;border-top:1px solid #ddd;"><b>${esc(v.name)}</b> — ${esc(v.addr)}<br><span style="color:#555;font-size:12px;">${v.slots.map(s=>`${esc(s.day)} ${esc(s.time)} ${esc(s.field)}`).join(' · ')}</span></div>`).join('');
  return `<div style="max-width:760px;margin:0 auto;padding:8px;font-family:var(--font);color:#000;">
    <div style="font-family:var(--mono);font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#666;">LMFC · Memorial Day Weekend · 2026</div>
    <h1 style="font-size:24px;margin:2px 0 16px;">Weekend schedule — Sofia &amp; Max</h1>
    ${days}
    <section class="pr-day"><h2 style="font-size:18px;margin:0 0 6px;">Venues</h2>${venues}</section>
  </div>`;
}

function renderPrint(){ $p.innerHTML = printHTML(); }

function collapse(w){
  w.classList.remove('open');
  w.style.zIndex = w.dataset.z || 2;
  const det = w.querySelector('.ev-details'); if(det) det.remove();
}
function expand(w){
  const ev = findEv(w.dataset.day, w.dataset.id);
  if(!ev) return;
  w.classList.add('open');
  w.style.zIndex = 4;
  w.insertAdjacentHTML('beforeend', ev.kind==='travel'?chipDetailsHTML(ev):gameDetailsHTML(ev));
}
function toggleExpand(w){
  const root = w.closest('.app-root');
  const wasOpen = w.classList.contains('open');
  (root||document).querySelectorAll('[data-evw].open').forEach(collapse);
  if(!wasOpen) expand(w);
}

document.addEventListener('click', (e)=>{
  // let Maps links / Directions through
  if(e.target.closest('[data-stop]')) return;

  const openBtn = e.target.closest('[data-open-ev]');
  if(openBtn){
    const key = openBtn.dataset.openEv;
    const card = document.querySelector('#app-mobile [data-evw="'+key+'"]');
    if(card){ const root=card.closest('.app-root'); root.querySelectorAll('[data-evw].open').forEach(collapse); expand(card); card.scrollIntoView({behavior:'smooth',block:'center'}); }
    return;
  }

  const evw = e.target.closest('[data-evw]');
  if(evw){ toggleExpand(evw); return; }

  const tab = e.target.closest('[data-tab]');
  if(tab){ activeTab = tab.dataset.tab; renderMobile(); return; }

  const dayBtn = e.target.closest('[data-day]');
  if(dayBtn && dayBtn.closest('#app-mobile')){ dayId = dayBtn.dataset.day; try{localStorage.setItem('lmfc.day',dayId);}catch(e2){} renderMobile(); return; }

  const dpanel = e.target.closest('[data-dpanel]');
  if(dpanel){ desktopPanel = dpanel.dataset.dpanel;
    const picker = dpanel.parentElement;
    [...picker.querySelectorAll('[data-dpanel]')].forEach(b=>{
      const on=b.dataset.dpanel===desktopPanel;
      b.style.background = on?T.ink:'transparent'; b.style.color = on?T.bg:T.ink2;
    });
    const panel = document.getElementById('d-panel'); if(panel) panel.innerHTML = desktopPanelHTML();
    return;
  }

  const hero = e.target.closest('[data-hero-toggle]');
  if(hero){ const card=hero.closest('[data-hero]'); const body=card.querySelector('.hero-body'); const chev=card.querySelector('.hero-chev');
    const open = body.style.display!=='none';
    body.style.display = open?'none':'block';
    if(chev) chev.innerHTML = ICON.chev(T.warn, open?'down':'up');
    return;
  }

  const pack = e.target.closest('[data-pack]');
  if(pack){
    const k=pack.dataset.pack; packState[k]=!packState[k];
    try{ localStorage.setItem('lmfc.pack', JSON.stringify(packState)); }catch(e3){}
    const on=packState[k];
    const box=pack.querySelector('.pk-box'), lab=pack.querySelector('.pk-label');
    box.style.background = on?T.ink:T.bg; box.style.borderColor = on?T.ink:T.hairlineStrong;
    box.innerHTML = on?ICON.check(T.bg):'';
    lab.style.color = on?T.muted:T.ink2; lab.style.textDecoration = on?'line-through':'none';
    return;
  }
});

renderMobile();
renderDesktop();
renderPrint();
</script>
</body>
</html>
